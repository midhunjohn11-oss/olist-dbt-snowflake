name: dbt CI

on:
  push:
    branches: [ dev, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-core dbt-snowflake

      - name: Write private key
        run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          olist_dbt_project:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                private_key_path: /tmp/rsa_key.p8
                private_key_passphrase: ""
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                schema: CI_${{ github.run_id }}
                threads: 4
                client_session_keep_alive: false
          EOF

      - name: dbt compile
        run: dbt compile --project-dir . --profiles-dir ~/.dbt

      - name: dbt run Silver
        run: dbt run --select silver --project-dir . --profiles-dir ~/.dbt --target ci

      - name: dbt test Silver
        run: dbt test --select silver --project-dir . --profiles-dir ~/.dbt --target ci

      - name: dbt run Gold
        run: dbt run --select gold --project-dir . --profiles-dir ~/.dbt --target ci

      - name: dbt test Gold
        run: dbt test --select gold --project-dir . --profiles-dir ~/.dbt --target ci

      - name: Cleanup CI schema
        if: always()
        run: |
          pip install snowflake-connector-python
          python3 << PYEOF
          import snowflake.connector
          conn = snowflake.connector.connect(
              account="${{ secrets.SNOWFLAKE_ACCOUNT }}",
              user="${{ secrets.SNOWFLAKE_USER }}",
              private_key_file="/tmp/rsa_key.p8",
              role="${{ secrets.SNOWFLAKE_ROLE }}",
              warehouse="${{ secrets.SNOWFLAKE_WAREHOUSE }}",
              database="${{ secrets.SNOWFLAKE_DATABASE }}"
          )
          conn.cursor().execute("DROP SCHEMA IF EXISTS CI_${{ github.run_id }}")
          print("CI schema dropped")
          PYEOF